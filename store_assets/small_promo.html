<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; width: 440px; height: 280px; overflow: hidden; }
  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fafafa;
    background:
      radial-gradient(ellipse at 25% 15%, rgba(74,222,128,0.22) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 85%, rgba(167,139,250,0.10) 0%, transparent 55%),
      #0a0a0a;
    display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
    text-align: center;
    position: relative;
    padding: 60px 20px 0;
  }
  .brand {
    font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
    color: #4ade80; margin-bottom: 8px;
  }
  h1 {
    font-size: 28px; font-weight: 900; line-height: 1.05; letter-spacing: -0.6px;
    margin: 0 0 10px; color: #fafafa;
  }
  h1 .accent { color: #4ade80; }
  .sub {
    font-size: 13px; color: #a1a1aa; max-width: 300px; line-height: 1.4; margin: 0 auto;
    padding: 0 20px;
  }
  .footer-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #2d8a2e, #4ade80, #a78bfa);
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3);
    font-size: 11px; font-weight: 600; color: #4ade80; margin-top: 12px;
  }
  .chip .dot {
    width: 6px; height: 6px; border-radius: 50%; background: #4ade80;
    box-shadow: 0 0 8px #4ade80;
  }
</style>
</head>
<body>
  <div class="brand">Find Me People</div>
  <h1>Customer service,<br><span class="accent">in 5 seconds.</span></h1>
  <div class="sub">Finds hidden support contacts on any website.</div>
  <div class="footer-bar"></div>
</body>
</html>
