<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; width: 380px; max-height: 520px; background: #0a0a0a; color: #fafafa; }

    .header { padding: 16px 16px 12px; border-bottom: 1px solid #1e1e1e; }
    .header h1 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .header h1 span { font-size: 20px; }
    .header .site { font-size: 11px; color: #71717a; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .status { padding: 10px 16px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .status .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #4ade80; }
    .dot-yellow { background: #fbbf24; }
    .dot-red { background: #f87171; }

    .section { padding: 8px 16px; }
    .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #52525b; margin-bottom: 8px; }

    .contact-item {
      background: #111113; border: 1px solid #1e1e1e; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 6px;
      transition: border-color 0.2s;
    }
    .contact-item:hover { border-color: #a78bfa; }
    .contact-main { cursor: pointer; }
    .contact-item .value { font-size: 14px; font-weight: 600; color: #fafafa; word-break: break-all; }
    .contact-item .meta { font-size: 11px; color: #52525b; margin-top: 3px; display: flex; justify-content: space-between; align-items: center; }
    .contact-item .score { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 8px; }

    /* Action toggle, panel, and chips (Compose templates / VOIP call-via) */
    .actions-toggle {
      background: none; border: none; color: #71717a;
      font-size: 11px; cursor: pointer; padding: 6px 0 0;
      font-family: inherit; display: inline-flex; align-items: center; gap: 4px;
      transition: color 0.2s;
    }
    .actions-toggle:hover { color: #a78bfa; }
    .actions-toggle .caret { display: inline-block; transition: transform 0.2s; }
    .actions-toggle.open .caret { transform: rotate(180deg); }
    .actions-panel { margin-top: 6px; display: none; }
    .actions-panel.open { display: block; }
    .client-picker {
      display: flex; flex-wrap: wrap; align-items: center; gap: 4px;
      padding: 0 0 8px;
    }
    .picker-label {
      font-size: 10px; color: #52525b; text-transform: uppercase;
      letter-spacing: 0.5px; margin-right: 4px;
    }
    .action-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .action-chip {
      background: #18181b; border: 1px solid #27272a;
      color: #d4d4d8; font-size: 11px; padding: 4px 9px;
      border-radius: 12px; cursor: pointer; font-family: inherit;
      transition: all 0.15s; white-space: nowrap;
    }
    .action-chip:hover { border-color: #a78bfa; color: #a78bfa; }
    .action-chip.selected {
      background: rgba(167,139,250,0.15);
      border-color: #a78bfa; color: #a78bfa;
    }
    .score-high { background: rgba(74,222,128,0.15); color: #4ade80; }
    .score-mid { background: rgba(251,191,36,0.15); color: #fbbf24; }
    .score-low { background: rgba(161,161,170,0.15); color: #a1a1aa; }

    .copied { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); background: #a78bfa; color: #0a0a0a; padding: 6px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; display: none; z-index: 10; }
    .copied.show { display: block; }

    .link-item {
      display: block; padding: 8px 12px; background: #111113; border: 1px solid #1e1e1e;
      border-radius: 8px; margin-bottom: 6px; text-decoration: none;
      font-size: 13px; color: #a78bfa; transition: border-color 0.2s;
    }
    .link-item:hover { border-color: #a78bfa; }
    .link-item .link-label { font-size: 11px; color: #52525b; }

    .empty { padding: 24px 16px; text-align: center; color: #52525b; font-size: 13px; line-height: 1.5; }
    .empty strong { color: #71717a; }

    .scanning { padding: 40px 16px; text-align: center; color: #52525b; font-size: 13px; }
    .scanning .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #27272a; border-top-color: #a78bfa; border-radius: 50%; animation: spin 0.6s linear infinite; margin-bottom: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .scroll { max-height: 420px; overflow-y: auto; padding-bottom: 8px; }
    .scroll::-webkit-scrollbar { width: 4px; }
    .scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

    .rescan-btn {
      display: block; width: calc(100% - 32px); margin: 8px 16px 12px; padding: 8px;
      background: #18181b; border: 1px solid #27272a; border-radius: 8px;
      color: #a78bfa; font-size: 12px; font-weight: 600; cursor: pointer;
      font-family: inherit; transition: border-color 0.2s; text-align: center;
    }
    .rescan-btn:hover { border-color: #a78bfa; }

    /* Hours section */
    .hours-banner {
      margin: 0 16px 8px; padding: 12px 14px;
      background: linear-gradient(135deg, rgba(74,222,128,0.08), rgba(74,222,128,0.02));
      border: 1px solid rgba(74,222,128,0.2); border-radius: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .hours-banner.closed {
      background: linear-gradient(135deg, rgba(248,113,113,0.08), rgba(248,113,113,0.02));
      border-color: rgba(248,113,113,0.2);
    }
    .hours-banner.unknown {
      background: rgba(161,161,170,0.06);
      border-color: rgba(161,161,170,0.2);
    }
    .hours-banner .pulse {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: #4ade80; box-shadow: 0 0 0 0 rgba(74,222,128,0.7);
      animation: pulse 2s infinite;
    }
    .hours-banner.closed .pulse { background: #f87171; box-shadow: 0 0 0 0 rgba(248,113,113,0.7); }
    .hours-banner.unknown .pulse { background: #71717a; animation: none; box-shadow: none; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(74,222,128,0.5); }
      70% { box-shadow: 0 0 0 8px rgba(74,222,128,0); }
      100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
    }
    .hours-banner .status-text { flex: 1; }
    .hours-banner .status-label {
      font-size: 13px; font-weight: 700; color: #fafafa; line-height: 1.2;
    }
    .hours-banner.closed .status-label { color: #fca5a5; }
    .hours-banner.open .status-label { color: #86efac; }
    .hours-banner .status-detail {
      font-size: 11px; color: #71717a; margin-top: 2px;
    }

    .hours-list {
      margin: 4px 16px 8px; padding: 10px 12px;
      background: #111113; border: 1px solid #1e1e1e; border-radius: 8px;
    }
    .hours-row {
      display: flex; justify-content: space-between;
      font-size: 12px; padding: 3px 0;
      color: #a1a1aa;
    }
    .hours-row.today { color: #fafafa; font-weight: 600; }
    .hours-row .day { text-transform: capitalize; }

    /* Review prompt toast (one-time, after PROMPT_THRESHOLD copies) */
    .review-toast {
      margin: 10px 16px;
      padding: 12px 38px 12px 14px;
      background: linear-gradient(135deg, rgba(74,222,128,0.10), rgba(167,139,250,0.06));
      border: 1px solid rgba(74,222,128,0.25);
      border-radius: 10px;
      position: relative;
    }
    .review-toast-close {
      position: absolute; top: 6px; right: 8px;
      background: none; border: none; color: #71717a;
      font-size: 18px; line-height: 1; cursor: pointer; padding: 2px 6px;
      font-family: inherit;
    }
    .review-toast-close:hover { color: #fafafa; }
    .review-toast-title {
      font-size: 13px; font-weight: 700; color: #fafafa;
      display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
    }
    .review-toast-title .star { color: #fbbf24; font-size: 14px; }
    .review-toast-body { font-size: 12px; color: #a1a1aa; margin-bottom: 10px; }
    .review-toast-actions { display: flex; gap: 8px; }
    .review-btn-primary, .review-btn-secondary {
      font-family: inherit; font-size: 11px; font-weight: 700;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      transition: all 0.15s; border: 1px solid transparent;
    }
    .review-btn-primary { background: #4ade80; color: #0a0a0a; border-color: #4ade80; }
    .review-btn-primary:hover { background: #86efac; border-color: #86efac; }
    .review-btn-secondary { background: transparent; color: #a1a1aa; border-color: #27272a; }
    .review-btn-secondary:hover { color: #fafafa; border-color: #4ade80; }

    /* Always-visible rate footer link */
    .rate-footer {
      text-align: center; padding: 8px 16px 12px;
      border-top: 1px solid #1e1e1e;
    }
    .rate-footer a {
      color: #71717a; font-size: 11px; text-decoration: none;
      display: inline-flex; align-items: center; gap: 4px;
      transition: color 0.15s;
    }
    .rate-footer a:hover { color: #4ade80; }
    .rate-footer .star { color: #fbbf24; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>&#128100;</span> Find Me People</h1>
    <div class="site" id="site-url">Scanning...</div>
  </div>

  <div id="content">
    <div class="scanning">
      <div class="spinner"></div>
      <p>Scanning page for contacts...</p>
    </div>
  </div>

  <div class="rate-footer">
    <a id="rate-link" href="#" target="_blank" rel="noopener"><span class="star">&#9733;</span> Rate Find Me People</a>
  </div>

  <div class="copied" id="copied">Copied to clipboard</div>

  <script src="popup.js"></script>
</body>
</html>
